<header class="hero"><div class="hero-main"><div class="eyebrow">GENERAL TRAINING · LAST-DAY MODE</div><h1>少背一点，<br>稳定多拿分。</h1><p>你的目标不是“炫技”，而是让考官轻松听懂、让每段都有发展、让复杂句准确出现。今天只练能当场用出来的东西。</p><div class="pills"><span class="pill">✓ 5 个高回报句式</span><span class="pill">✓ 1 个万能故事骨架</span><span class="pill">✓ 3 种书信语气</span><span class="pill">✓ 5 类作文问法</span></div></div><aside class="score"><div><small>今日掌握度</small><br><strong id="score">0%</strong></div><div><div class="progress"><i id="bar"></i></div><small>勾选页面底部任务，自动保存</small></div></aside></header>
<main class="wrap">
 <div class="alert"><b>先纠正一个误区：</b> “not only...but also” 或倒装不会自动加分。官方标准看的是范围 + 准确性 + 是否自然。写错一个炫技句，不如写对一个 because / although / if 复合句。</div>
 <section id="grammar"><div class="section-head"><h2>五个真正高回报的句式</h2><p>每一种负责一个功能。一天内能掌握、口语写作都能迁移。</p></div><div class="grid">
  <article class="card"><span class="tag">01 原因</span><h3>Because → 解释观点</h3><div class="example">I prefer public transport <b>because it is affordable and reliable.</b></div><div class="cn">不要只说 “I like it.”，永远补一个 because。</div></article>
  <article class="card"><span class="tag">02 让步</span><h3>Although → 展示两面</h3><div class="example"><b>Although it can be expensive,</b> it saves a great deal of time.</div><div class="cn bad">✗ Although ..., but ...（不能同时用）</div></article>
  <article class="card"><span class="tag">03 条件</span><h3>If → 方案和后果</h3><div class="example"><b>If the government improves the service,</b> more people will use it.</div><div class="cn">If + 一般现在时，主句 will + 动词原形。</div></article>
  <article class="card"><span class="tag">04 定语</span><h3>who / which → 添加细节</h3><div class="example">My uncle, <b>who runs a small café,</b> taught me this skill.</div><div class="cn">who 说人；which 说物。逗号之间是额外信息。</div></article>
  <article class="card"><span class="tag">05 并列升级</span><h3>not only A but also B</h3><div class="example">It <b>not only reduces costs but also improves</b> efficiency.</div><div class="cn">A、B 形式必须平行。考前不要强求倒装。</div><button class="reveal" data-reveal>为什么不推荐倒装？</button><div class="answer">倒装应为 “Not only <b>does it reduce</b> costs, but it also improves...” 容易漏助动词或改变时态。普通形式已足够展示范围。</div></article>
  <article class="card"><span class="tag">时态地图</span><h3>别背时态，跟时间走</h3><div class="example"><b>usually</b> → present<br><b>last year</b> → past<br><b>in the future</b> → will / may<br><b>since 2020</b> → have + p.p.</div><div class="cn">口语 Part 2 故事以过去时为主；结尾回到现在感受。</div></article>
 </div><div class="quiz" data-flash="grammar"><span class="tag">句式纠错抽卡</span><h3 class="flash-q">点击抽题，判断句子是否正确</h3><div class="story-output flash-a">先说“正确/错误”，错误的话请改正。</div><button class="primary flash-next" style="padding:10px 14px;border-radius:9px;margin-top:12px">抽一题</button> <button class="secondary flash-show" style="padding:10px 14px;border-radius:9px">看答案</button></div></section>
 <section id="linking"><div class="section-head"><h2>连接词：按功能记，不按字典记</h2><p>一段用 1–2 个就够。重复但准确，比堆满 nevertheless 更好。</p></div><div class="grid three">
  <div class="card"><h3>加一个点</h3><p><b>and</b>（口语自然）<br><b>also</b>（最安全）<br><b>in addition</b>（新句/新点）<br><b>as well as</b> + 名词 / -ing</p></div>
  <div class="card"><h3>转个方向</h3><p><b>but</b>（口语自然）<br><b>however,</b>（写作新句）<br><b>although</b> + 完整句<br><b>despite</b> + 名词 / -ing</p></div>
  <div class="card"><h3>推进逻辑</h3><p><b>because</b> 原因<br><b>therefore,</b> 结果<br><b>for example,</b> 举例<br><b>as a result,</b> 后果</p></div>
 </div><div class="alert"><b>安全标点：</b> “It is convenient. However, it is expensive.” 不要写成逗号拼接：“It is convenient, however it is expensive.”</div><div class="quiz" data-flash="link"><span class="tag">连接词填空</span><h3 class="flash-q">根据逻辑选择连接词</h3><div class="story-output flash-a">先开口填空，再显示答案。</div><button class="primary flash-next" style="padding:10px 14px;border-radius:9px;margin-top:12px">随机填空</button> <button class="secondary flash-show" style="padding:10px 14px;border-radius:9px">看答案</button></div></section>
 <section id="vocab"><div class="section-head"><h2>高频替换词：一词三变</h2><p>先记绿色的“安全款”，再记语气差异。点击分类切换；目标是同一答案里自然地换一次，而不是每句话都换。</p></div>
  <div class="tabs" data-tabs="vocab"><button class="tab active">数量多少</button><button class="tab">喜欢讨厌</button><button class="tab">人群称呼</button><button class="tab">好坏重要</button><button class="tab">观点认为</button><button class="tab">变化问题</button></div>
  <div data-panels="vocab">
   <div class="panel active"><div class="grid three">
    <div class="card"><span class="tag">可数 + 不可数</span><h3>a lot of</h3><p>口语最自然；正式写作也不算错，但可换成 <b>a great deal of</b>。</p><div class="example">A lot of people...<br>A great deal of time...</div></div>
    <div class="card"><span class="tag">可数复数</span><h3>many / numerous</h3><p><b>many people</b> 最安全；<b>numerous studies/reasons</b> 更正式。</p><div class="cn bad">✗ numerous money<br><span class="good">✓ a considerable amount of money</span></div></div>
    <div class="card"><span class="tag">种类不同</span><h3>various / a range of</h3><p>不是“很多”，而是“多种不同的”。</p><div class="example">various reasons<br>a wide range of services</div></div>
    <div class="card"><span class="tag">超过一半</span><h3>the majority of</h3><p><b>the majority of people</b> = 大多数人。没有证据时，作文中慎用绝对数量判断。</p></div>
    <div class="card"><span class="tag">压倒性多数</span><h3>the vast majority of</h3><p>比 majority 强很多，接近“几乎全部”。不能只为显高级而替换。</p><div class="cn bad">✗ a vast majority of people（通常用 the）</div></div>
    <div class="card"><span class="tag">少量</span><h3>a few / few</h3><p><b>a few</b> = 有一些（偏积极）；<b>few</b> = 几乎没有（偏消极）。不可数用 a little / little。</p></div>
   </div></div>
   <div class="panel"><div class="grid three">
    <div class="card"><h3>I like...</h3><p>最自然，任何场景都安全。</p><div class="example">I really like hiking because...</div></div>
    <div class="card"><h3>I'm fond of...</h3><p>长期、温和的喜爱；接名词或 <b>-ing</b>。</p><div class="example">I'm quite fond of cooking.</div></div>
    <div class="card"><h3>I'm keen on...</h3><p>对活动很感兴趣、很热衷。</p><div class="example">I'm keen on outdoor activities.</div></div>
    <div class="card"><h3>I enjoy...</h3><p>后接名词或 <b>-ing</b>，不能接 to do。</p><div class="cn bad">✗ I enjoy to read<br><span class="good">✓ I enjoy reading</span></div></div>
    <div class="card"><h3>I'm a big fan of...</h3><p>口语自然、有感情色彩；Task 2 不使用。</p></div>
    <div class="card"><h3>不喜欢</h3><p><b>I don't really like...</b> 温和<br><b>I'm not keen on...</b> 自然<br><b>I can't stand...</b> 非常讨厌（口语）</p></div>
   </div></div>
   <div class="panel"><div class="grid three">
    <div class="card"><h3>a person</h3><p>具体的一个人，口语最自然。</p><div class="example">She is a patient person.</div></div>
    <div class="card"><h3>an individual</h3><p>正式、抽象，强调社会中的个体。不要在口语故事里反复代替 person。</p><div class="example">This can benefit both individuals and society.</div></div>
    <div class="card"><h3>people</h3><p>泛指人们，最安全。不是 persons。</p><div class="cn good">✓ Many people believe...</div></div>
    <div class="card"><h3>the public</h3><p>公众，整体概念。</p><div class="example">The policy should protect the public.</div></div>
    <div class="card"><h3>residents / citizens</h3><p><b>residents</b> 某地居民；<b>citizens</b> 某国公民，不能随意互换。</p></div>
    <div class="card"><h3>children / young people</h3><p><b>children</b> 儿童；<b>young people</b> 范围更广。避免用 youngsters 写正式作文。</p></div>
   </div></div>
   <div class="panel"><div class="grid three">
    <div class="card"><h3>good · 正面</h3><p><b>beneficial</b> 有益的<br><b>effective</b> 有效果的<br><b>practical</b> 可实行的<br><b>rewarding</b> 有成就感的</p><div class="example">an effective solution / a rewarding job</div></div>
    <div class="card"><h3>bad · 负面</h3><p><b>harmful</b> 有害的<br><b>damaging</b> 造成损害的<br><b>ineffective</b> 无效的<br><b>unpleasant</b> 令人不快的</p><div class="example">a harmful effect / an unpleasant experience</div></div>
    <div class="card"><h3>important</h3><p><b>essential</b> 必不可少<br><b>significant</b> 重要/显著<br><b>crucial</b> 极其关键</p><div class="cn">程度不同，不要句句 crucial。</div></div>
    <div class="card"><h3>影响：正面 / 负面</h3><p><b>positive / favourable</b><br><b>negative / adverse</b></p><div class="example">an adverse impact on mental health</div><div class="cn">adverse 较正式，常搭配 effect / impact。</div></div>
    <div class="card"><h3>有用 / 没用</h3><p><b>helpful / valuable / practical</b><br><b>useless / impractical / unnecessary</b></p><div class="cn">写作中 ineffective 往往比 useless 更客观。</div></div>
    <div class="card"><h3>容易 / 困难</h3><p><b>straightforward / convenient</b><br><b>challenging / demanding / complicated</b></p><div class="example">a demanding job / a complicated issue</div></div>
   </div></div>
   <div class="panel"><div class="grid three">
    <div class="card"><h3>赞同 · 口语</h3><p><b>I agree.</b><br><b>I completely agree with that.</b><br><b>That makes sense to me.</b></p></div><div class="card"><h3>反对 · 口语</h3><p><b>I don't really agree.</b><br><b>I'm not convinced that...</b><br><b>I see it differently.</b></p><div class="cn">比直接说 You're wrong 更礼貌。</div></div><div class="card"><h3>正面观点 · 写作</h3><p><b>I believe...</b><br><b>In my view,...</b><br><b>I would argue that...</b></p></div><div class="card"><h3>负面观点 · 写作</h3><p><b>I disagree with this view.</b><br><b>This argument is unconvincing.</b><br><b>I have serious concerns about...</b></p></div><div class="card"><h3>部分同意</h3><p><b>I agree to some extent; however,...</b><br><b>While this may be true, ...</b><br><b>There is some truth in this view, but...</b></p></div><div class="card"><h3>评价一个观点</h3><p><b>reasonable / convincing / valid</b> 合理可信<br><b>questionable / unrealistic / misleading</b> 可疑、不现实、误导</p><div class="example">This proposal may be unrealistic.</div></div>
   </div></div>
   <div class="panel"><div class="grid three">
    <div class="card"><h3>change</h3><p><b>improve</b> 改善<br><b>reduce</b> 减少<br><b>increase</b> 增加<br><b>transform</b> 彻底改变</p></div><div class="card"><h3>problem</h3><p><b>issue</b> 议题/问题<br><b>challenge</b> 需要克服<br><b>difficulty</b> 困难</p><div class="cn">issue 不一定是负面的。</div></div><div class="card"><h3>cause</h3><p><b>lead to</b> 导致<br><b>result in</b> 导致<br><b>contribute to</b> 是部分原因</p></div><div class="card"><h3>solve</h3><p><b>address</b> 着手处理<br><b>tackle</b> 积极处理<br><b>resolve</b> 解决</p><div class="example">address the problem</div></div><div class="card"><h3>help</h3><p><b>support</b> 支持<br><b>enable A to do B</b> 使能够<br><b>encourage A to do B</b> 鼓励</p></div><div class="card"><h3>effect</h3><p><b>impact on</b> 对…的影响<br><b>consequence</b> 后果<br><b>benefit / drawback</b> 优点/缺点</p></div>
   </div></div>
  </div>
  <div class="quiz" style="margin-top:18px"><span class="tag">30 秒抽认卡</span><h3 id="vocabPrompt">点击开始，随机练一个基础词</h3><div class="story-output" id="vocabAnswer">先自己说出 2 个合适变体，再看答案。</div><button class="primary" style="padding:10px 14px;border-radius:9px;margin-top:12px" id="vocabNext">随机出题</button> <button class="secondary" style="padding:10px 14px;border-radius:9px" id="vocabReveal">显示答案</button></div>
  <div class="alert"><b>三条使用规则：</b>① 一段避免重复 3 次同一个词即可，不必每次都换；② 同义词必须保持原意和搭配；③ 口语自然最重要，别把 person 硬换成 individual。官方评分强调 range、precision、appropriacy 和 collocation。</div>
 </section>
 <section id="speaking"><div class="section-head"><h2>口语：一个故事，覆盖很多 Topic</h2><p>不是逐字背稿，而是固定“人物—地点—问题—行动—结果—感受”的素材零件。</p></div>
  <div class="tabs" id="storyPresets"><button class="tab active" data-story="concert">🎤 薛之谦演唱会</button><button class="tab" data-story="work">💄 Tokyo Beauty 工作</button><button class="tab" data-story="wedding">💍 朋友婚礼</button></div>
  <div class="grid"><div class="card"><h3>万能六段：背景 → 细节 → 转折 → 行动 → 结果 → 感受</h3><div class="story-slot">核心人物 <textarea id="person"></textarea></div><div class="story-slot">时间、事件与地点 <textarea id="event"></textarea></div><div class="story-slot">意外、困难或最特别的细节 <textarea id="action"></textarea></div><div class="story-slot">结果、感受与学到的东西 <textarea id="result"></textarea></div><button class="primary" style="padding:10px 14px;border-radius:9px;margin-top:12px" id="buildStory">生成通用 2 分钟骨架</button></div>
  <div class="card"><h3>同一故事，换开头就能答</h3><p>👤 <b>人物：</b>The person I'd like to talk about is...<br>📍 <b>地点：</b>A place that left a strong impression on me was...<br>🎉 <b>事件：</b>One memorable event I attended was...<br>💼 <b>工作：</b>A job that taught me a lot was...<br>🧠 <b>困难：</b>One challenge I managed to overcome was...<br>🌱 <b>改变/技能：</b>An experience that made me more confident was...</p><div class="story-output" id="storyOutput">选择上方一个真实故事。记住事实关键词和六段顺序，不要逐字背诵。</div></div></div>
  <div class="alert"><b>真正的“万能”方法：</b>故事事实不变，只改变题目的聚焦点。问人物就多讲人物性格；问地点就多讲环境；问困难就展开问题与解决；问物品就把焦点放在门票、员工名牌、婚礼礼物等具体物品上。</div>
  <div class="grid three" style="margin-top:16px"><div class="card"><h3>Part 1 · 2–3 句</h3><p><b>Answer → because → detail</b></p><div class="example">Yes, definitely. Mainly because... For example...</div></div><div class="card"><h3>Part 2 · 6 格故事</h3><p><b>背景 → 人/物 → 发生 → 细节 → 结果 → 感受</b></p><div class="example">I'd like to talk about... This happened when...</div></div><div class="card"><h3>Part 3 · PREP</h3><p><b>Point → Reason → Example → Point</b></p><div class="example">I believe... This is because... For instance... So overall...</div></div></div>
  <div class="quiz" data-flash="speaking" style="margin-top:16px"><span class="tag">故事变形抽卡</span><h3 class="flash-q">随机抽一个 Part 2 题目</h3><div class="story-output flash-a">选择三个故事之一，用六段骨架快速说出开头和三个关键词。</div><button class="primary flash-next" style="padding:10px 14px;border-radius:9px;margin-top:12px">抽 Topic</button> <button class="secondary flash-show" style="padding:10px 14px;border-radius:9px">看思路</button></div>
  <div class="recorder" id="recorder"><div class="recorder-grid"><div><span class="record-dot"></span><b>Part 2 录音工作台</b><p>准备 1 分钟，录制最多 2 分钟。录音只留在当前页面。</p><button class="cta primary" id="recordBtn">开始录音</button> <button class="cta ghost" id="discardRecording">重新录制</button><div id="recordStatus" class="cn">尚未请求麦克风权限</div></div><div><b>回放后再自评</b><audio id="recordPlayback" controls hidden></audio><p id="recordFallback" class="cn">如果浏览器不支持录音，将自动保留计时训练。</p></div></div><div class="self-rate"><label class="rate-box">流利连贯<select data-rate="fluency"><option value="">选择</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label><label class="rate-box">词汇<select data-rate="vocab"><option value="">选择</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label><label class="rate-box">语法<select data-rate="grammar"><option value="">选择</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label><label class="rate-box">发音<select data-rate="pronunciation"><option value="">选择</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label></div><button class="cta primary" id="saveSpeakingReview" style="margin-top:12px">保存本次自评</button><div id="speakingAdvice" class="story-output"><b>回听时逐项检查</b><ul class="self-check"><li>是否说到 1分30秒–2分钟？</li><li>是否有超过 3 秒的沉默？</li><li>是否按背景→经过→结果→感受展开？</li><li>是否反复使用 um / er / you know？</li><li>过去的故事是否主要使用过去时？</li><li>是否出现 2–3 个完整复合句？</li><li>是否自然替换了 1–2 个重复词？</li><li>每个词是否清楚到不需猜测？</li><li>是否按意群停顿，而非逐词读？</li><li>犯错后是否快速改正并继续？</li></ul><p><b>评分方法：</b>大部分能做到给 4；做到一半给 3；经常中断或听不明白给 2。目标不是零错误，而是错误不妨碍理解。</p></div></div>
 </section>
 <section id="letter"><div class="section-head"><h2>G 类小作文：先看收信人</h2><p>20 分钟、至少 150 词。三个 bullet 每个一段，并在开头直接说明目的。</p></div>
  <div class="tabs" data-tabs="letter"><button class="tab active">Formal 陌生人</button><button class="tab">Semi-formal 工作关系</button><button class="tab">Informal 朋友家人</button></div>
  <div data-panels="letter"><div class="panel active"><div class="grid"><div class="card"><h3>判断</h3><p>公司、机构、房东中介、没见过的负责人；不知道姓名。</p><p><b>Dear Sir or Madam,</b><br>不缩写：I am / cannot<br><b>Yours faithfully,</b></p></div><div class="template">Dear Sir or Madam,

I am writing to <span class="accent">complain about / enquire about / request...</span>

[Bullet 1: 情况 + 细节]

[Bullet 2: 影响 + 例子]

I would appreciate it if you could [Bullet 3: 期望行动].

Yours faithfully,
Name</div></div></div>
  <div class="panel"><div class="grid"><div class="card"><h3>判断</h3><p>认识但有职业距离：经理、老师、邻居；知道姓名。</p><p><b>Dear Mr Smith,</b><br>礼貌但不僵硬<br><b>Yours sincerely / Kind regards,</b></p></div><div class="template">Dear Ms Chen,

I am writing regarding <span class="accent">...</span>

[Bullet 1]

[Bullet 2]

I was wondering if you could [Bullet 3].

Kind regards,
Name</div></div></div>
  <div class="panel"><div class="grid"><div class="card"><h3>判断</h3><p>朋友、亲戚等亲密关系；可以缩写、表达情绪。</p><p><b>Dear Amy, / Hi Amy,</b><br>I'm / can't / It'd be great<br><b>Best wishes / Take care,</b></p></div><div class="template">Dear Amy,

Hope you're doing well! I'm writing to <span class="accent">invite / thank / tell you...</span>

[Bullet 1]

[Bullet 2]

It'd be great if you could [Bullet 3].

Best wishes,
Name</div></div></div></div>
  <div class="section-head"><h2 style="font-size:30px">小作文例题库：先认人，再排三点</h2><p>推荐 5 段：目的段 + 三个 bullet 各一段 + 简短收尾。题目中的三个 bullet 决定主体内容。</p></div>
  <details class="case"><summary>例 1 · 向陌生酒店经理投诉服务 → Formal</summary><div class="case-body"><div class="example">You recently stayed at a hotel and were dissatisfied. Write to the hotel manager: describe the problem; explain how it affected you; say what you would like the manager to do.</div><p><b>判断：</b>没见过的酒店经理 + 投诉，所以用 Formal；不知道姓名时用 Dear Sir or Madam。</p><div class="route"><b>第 1 段</b><span>I am writing to complain about the service I received during my stay...（目的 + 日期）</span><b>第 2 段</b><span>Bullet 1：房间没有清洁、空调无法工作；给具体细节。</span><b>第 3 段</b><span>Bullet 2：无法休息，影响第二天的重要会议。</span><b>第 4 段</b><span>Bullet 3：要求退款或部分补偿，并希望酒店调查。</span><b>最后</b><span>I would appreciate a response at your earliest convenience. / Yours faithfully,</span></div></div></details>
  <details class="case"><summary>例 2 · 向课程机构询问信息 → Formal</summary><div class="case-body"><div class="example">Write to a training centre about a weekend course: explain why you are interested; ask about the schedule; ask about fees and materials.</div><p><b>判断：</b>陌生机构 + 询问，Formal。</p><div class="route"><b>第 1 段</b><span>I am writing to enquire about your weekend customer-service course.</span><b>第 2 段</b><span>为什么感兴趣：目前在美妆店工作，希望改善沟通技能。</span><b>第 3 段</b><span>询问上课日期、每日时间和课程总时长。</span><b>第 4 段</b><span>询问费用是否包含教材，是否提供证书。</span><b>最后</b><span>I look forward to receiving the information. / Yours faithfully,</span></div></div></details>
  <details class="case"><summary>例 3 · 给经理申请调班 → Semi-formal</summary><div class="case-body"><div class="example">Write to your manager: explain why you cannot work your usual shift; suggest another arrangement; explain how you will complete your duties.</div><p><b>判断：</b>认识对方但有职业距离，用 Semi-formal；Dear Ms Brown。</p><div class="route"><b>第 1 段</b><span>I am writing to ask whether I could change my shift next Saturday.</span><b>第 2 段</b><span>原因：要参加好友婚礼，时间与原班次冲突。</span><b>第 3 段</b><span>建议：与同事交换，并在周日替对方上班。</span><b>第 4 段</b><span>承诺提前完成库存检查，并告知同事未完成事项。</span><b>最后</b><span>Thank you for considering my request. / Kind regards,</span></div></div></details>
  <details class="case"><summary>例 4 · 给认识的邻居道歉 → Semi-formal</summary><div class="case-body"><div class="example">Write to a neighbour about noise from a party: apologise; explain what happened; say how you will prevent it in future.</div><p><b>判断：</b>认识的邻居，但内容是正式道歉；语气礼貌而不僵硬。</p><div class="route"><b>第 1 段</b><span>I am writing to apologise for the noise from my apartment last Saturday.</span><b>第 2 段</b><span>明确道歉并承认打扰，不找借口。</span><b>第 3 段</b><span>解释朋友婚礼后临时聚会，人数超过预期。</span><b>第 4 段</b><span>以后提前通知、限制时间并保持低音量。</span><b>最后</b><span>I hope you can accept my sincere apology. / Kind regards,</span></div></div></details>
  <details class="case"><summary>例 5 · 邀请好朋友来看演唱会 → Informal</summary><div class="case-body"><div class="example">Write to a friend: invite them to a concert; explain why they would enjoy it; give arrangements for the day.</div><p><b>判断：</b>好友 + 邀请，用 Informal，可以缩写。</p><div class="route"><b>第 1 段</b><span>Hope you're doing well! I've got two tickets to a Joker Xue concert...</span><b>第 2 段</b><span>直接邀请，说明日期和场馆。</span><b>第 3 段</b><span>对方也喜欢他的歌，现场氛围会很好。</span><b>第 4 段</b><span>约见面时间、交通、演出后吃饭安排。</span><b>最后</b><span>Let me know if you can make it! / Best wishes,</span></div></div></details>
  <details class="case"><summary>例 6 · 给朋友提供找工作建议 → Informal</summary><div class="case-body"><div class="example">A friend wants a part-time job. Suggest a type of work; explain why it suits them; give advice about applying.</div><p><b>判断：</b>好友 + 建议，用 Informal。</p><div class="route"><b>第 1 段</b><span>Great to hear from you! I think a retail job would suit you really well.</span><b>第 2 段</b><span>建议美妆零售或客户服务工作。</span><b>第 3 段</b><span>为什么适合：朋友外向、有耐心、喜欢化妆品。</span><b>第 4 段</b><span>申请建议：简历突出沟通技能，亲自到店询问。</span><b>最后</b><span>Good luck, and let me know how it goes! / Take care,</span></div></div></details>
  <div class="alert"><b>快速判断口诀：</b>陌生个人/机构 → Formal；认识但有职业或礼貌距离 → Semi-formal；朋友家人 → Informal。投诉不一定永远 Formal——写给认识的邻居仍通常是 Semi-formal。</div>
  <div class="quiz" data-flash="letter" style="margin-top:16px"><span class="tag">书信语气抽卡</span><h3 class="flash-q">判断 Formal / Semi-formal / Informal</h3><div class="story-output flash-a">回答语气，并说出称呼和结尾。</div><button class="primary flash-next" style="padding:10px 14px;border-radius:9px;margin-top:12px">抽一封信</button> <button class="secondary flash-show" style="padding:10px 14px;border-radius:9px">看答案</button></div>
 </section>
 <section id="essay"><div class="section-head"><h2>大作文：别背全文，认清问句</h2><p>40 分钟、至少 250 词、Task 2 权重是 Task 1 的两倍。稳定用 4 段。</p></div>
  <div class="tabs" data-tabs="essay"><button class="tab active">同意/不同意</button><button class="tab">双边讨论</button><button class="tab">优缺点</button><button class="tab">问题/解决</button><button class="tab">两问型</button></div>
  <div data-panels="essay">
   <div class="panel active"><div class="template">P1 改写题目 + <span class="accent">I largely agree/disagree...</span>
P2 理由一 → 解释 → 例子
P3 理由二（或承认反方后反驳）→ 解释 → 例子
P4 <span class="accent">In conclusion, I believe...</span></div></div>
   <div class="panel"><div class="template">P1 改写 + <span class="accent">Discuss both; 清楚写自己观点</span>
P2 On the one hand, [观点 A + 原因 + 例子]
P3 On the other hand, [观点 B + 原因 + 例子] + 我的立场
P4 总结双方 + 重申我的立场</div></div>
   <div class="panel"><div class="template">P1 改写 + 明确 overall 是利大于弊还是相反（若题目要求）
P2 One main advantage is... → 解释 → 例子
P3 However, a possible drawback is... → 解释 → 例子
P4 On balance, ...</div></div>
   <div class="panel"><div class="template">P1 改写 + 本文将讨论问题与方案
P2 The main problem is... → 为什么 → 后果/例子
P3 One practical solution is... → 谁做 → 如何有效
P4 总结：问题可通过 X 缓解</div></div>
   <div class="panel"><div class="template">P1 改写 + <span class="accent">直接简答两个问题</span>
P2 完整回答 Question 1 → 原因 → 例子
P3 完整回答 Question 2 → 原因 → 例子
P4 总结两个答案

⚠️ 两问型不是固定主题分类：圈出两个问号，逐一回答。</div></div>
  </div><div class="card" style="margin-top:16px"><h3>万能主体段：Idea → Why → Example → Link</h3><div class="example"><b>One major benefit is that</b> flexible work saves commuting time. <b>This is because</b> employees can work from home. <b>For example,</b> a parent may use that extra hour to care for a child. <b>Therefore,</b> flexible work can improve work–life balance.</div><p class="cn">每段只讲一个中心。例子可以来自个人经验，不需要编统计数字。</p></div>
  <div class="section-head"><h2 style="font-size:30px">大作文例题库：看最后一句定结构</h2><p>题目前面的背景不是任务。真正决定结构的是最后的 instruction/question。</p></div>
  <details class="case"><summary>例 1 · To what extent do you agree or disagree? → 同意/不同意</summary><div class="case-body"><div class="example">Some people think that online shopping will eventually replace physical stores. To what extent do you agree or disagree?</div><p><b>识别词：</b>agree or disagree。必须从开头到结尾保持清楚立场；可以完全同意、完全不同意或部分同意。</p><div class="route"><b>P1 开头</b><span>改写题目 + I largely disagree because physical shops provide immediate service and experiences that websites cannot fully replace.</span><b>P2</b><span>理由一：到店能试用、立刻获得商品；以化妆品为例。</span><b>P3</b><span>让步 + 理由二：虽然网购方便，但实体店提供个性化建议和社交体验。</span><b>P4 结论</b><span>重申：网购会继续增长，但不太可能完全取代实体店。</span></div></div></details>
  <details class="case"><summary>例 2 · Do you agree or disagree? → 仍然是观点型</summary><div class="case-body"><div class="example">Employers should allow all employees to work from home. Do you agree or disagree?</div><div class="route"><b>P1</b><span>部分同意：适合某些岗位，但不适合所有工作。</span><b>P2</b><span>同意面：办公室岗位节省通勤时间、提高灵活性。</span><b>P3</b><span>限制面：零售、医疗等需要现场互动；Tokyo Beauty 员工必须服务顾客。</span><b>P4</b><span>远程工作应按岗位决定，不能要求所有雇员都如此。</span></div></div></details>
  <details class="case"><summary>例 3 · Discuss both views and give your opinion → 双边讨论</summary><div class="case-body"><div class="example">Some people believe shops should focus on low prices, while others think good customer service is more important. Discuss both views and give your own opinion.</div><p><b>识别词：</b>both views + your opinion，三个任务都要完成。</p><div class="route"><b>P1</b><span>改写双方 + 明确自己认为服务更重要。</span><b>P2</b><span>低价观点：减轻家庭开支、吸引更多顾客；给生活成本例子。</span><b>P3</b><span>服务观点 + 自己立场：专业建议建立信任、带来回头客；美妆店例子。</span><b>P4</b><span>承认价格重要，但长期而言服务更能留住顾客。</span></div></div></details>
  <details class="case"><summary>例 4 · Advantages and disadvantages → 优缺点</summary><div class="case-body"><div class="example">More people are buying beauty products online. What are the advantages and disadvantages of this development?</div><p><b>识别词：</b>advantages and disadvantages。题目没问 opinion/outweigh，不必强行选一边，但结论可概括。</p><div class="route"><b>P1</b><span>改写 + 本文将讨论便利性和无法试用的风险。</span><b>P2</b><span>优点：选择多、比价方便、居住偏远也能购买。</span><b>P3</b><span>缺点：无法试色或获得个性化建议，可能买错产品。</span><b>P4</b><span>总结：方便，但消费者应查看退货政策和产品信息。</span></div></div></details>
  <details class="case"><summary>例 5 · Do the advantages outweigh the disadvantages? → 优缺点 + 必须比较</summary><div class="case-body"><div class="example">Many people move abroad for work. Do the advantages outweigh the disadvantages?</div><p><b>关键区别：</b>outweigh 要明确“哪边更大”，不能只各写一段后不判断。</p><div class="route"><b>P1</b><span>立场：优势总体更大。</span><b>P2</b><span>缺点：孤独、语言和文化适应困难；说明可通过时间和支持缓解。</span><b>P3</b><span>更大的优点：职业机会、语言能力、独立性；解释为何影响更长久。</span><b>P4</b><span>短期困难真实存在，但长期个人和职业收益更显著。</span></div></div></details>
  <details class="case"><summary>例 6 · What problems...? What solutions...? → 问题/解决</summary><div class="case-body"><div class="example">Many cities suffer from traffic congestion. What problems does this cause, and what measures can be taken to solve them?</div><div class="route"><b>P1</b><span>改写 + 预告：污染/时间损失，方案是公共交通和限制私家车。</span><b>P2</b><span>问题：通勤变长、压力增加、空气污染；展开因果链。</span><b>P3</b><span>方案：政府提高公交可靠性并建设自行车道；解释为何会减少开车。</span><b>P4</b><span>这些问题严重，但可通过更便利的替代交通缓解。</span></div></div></details>
  <details class="case"><summary>例 7 · Why...? What effects...? → 两问型</summary><div class="case-body"><div class="example">Shopping is increasingly becoming a leisure activity. Why is this happening? What effects does it have on individuals and society?</div><p><b>识别方法：</b>两个不同问号。主体段逐问回答；effects 还同时要求 individuals and society。</p><div class="route"><b>P1</b><span>直接简答：娱乐设施和广告推动此趋势；它可能导致过度消费并改变社区。</span><b>P2</b><span>回答 Why：商场结合餐饮娱乐；社交媒体和促销刺激购买。</span><b>P3</b><span>回答 Effects：个人可能负债；社会增加消费和就业，但小商店受压力。</span><b>P4</b><span>总结两个答案，不加入新观点。</span></div></div></details>
  <details class="case"><summary>例 8 · Why...? Is this positive or negative? → 两问型 + 评价立场</summary><div class="case-body"><div class="example">More people now change jobs several times during their careers. Why is this the case? Is this a positive or negative development?</div><div class="route"><b>P1</b><span>回答两个问题：更多机会和更高期望导致跳槽；总体是正面发展。</span><b>P2</b><span>回答 Why：寻求更高工资、成长机会和更好的工作生活平衡。</span><b>P3</b><span>回答 Positive/negative：技能更广、雇主需改善待遇；承认稳定性可能下降。</span><b>P4</b><span>重申原因和总体正面判断。</span></div></div></details>
  <div class="alert"><b>最容易失分的混淆：</b>“Discuss both views”必须写两边；“outweigh”必须比较大小；两个问号通常按两个主体段回答；“positive or negative”必须评价，不只是描述影响。</div>
